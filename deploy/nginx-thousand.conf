# nginx reverse-proxy for Thousand, mounted at games.online-trash.com/thousand.
# Install on the VPS host (e.g. /etc/nginx/sites-available/games.online-trash.com),
# then run certbot to add the TLS cert + the :80→:443 redirect.
#
# The trailing slash on proxy_pass strips the /thousand prefix, so the Node app
# keeps serving from the root (/, /css/..., /api/..., /ws). The client requests
# everything under /thousand/ (via the injected <base href> + basePath.js).

# Required for WebSocket upgrades. Define once (e.g. in http {} / conf.d).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name games.online-trash.com;

    # ssl_certificate / ssl_certificate_key are managed by certbot.

    # No trailing slash → redirect so relative asset URLs resolve correctly.
    location = /thousand {
        return 301 /thousand/;
    }

    location /thousand/ {
        proxy_pass http://127.0.0.1:3000/;   # trailing slash strips /thousand/

        proxy_http_version 1.1;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         $connection_upgrade;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_read_timeout 3600s;            # keep idle WebSockets alive
    }
}
