# nginx reverse-proxy snippet for Thousand, mounted at games.online-trash.com/thousand.
#
# Production nginx runs as a Docker container (see temp/docker-compose.yml in the
# infra repo, config in /web/nginx/conf.d/). This is a reference snippet — copy the
# two pieces below into that container's config (e.g. /web/nginx/conf.d/default.conf),
# inside the existing `server { server_name games.online-trash.com; listen 443 ssl; }`
# block, then `nginx -t` and reload.
#
# The trailing slash on proxy_pass strips the /thousand prefix, so the Node app keeps
# serving from its own root (/, /css/..., /api/..., /ws). The client requests
# everything under /thousand/ (via the injected <base href> + basePath.js).
#
# Networking: the nginx *container* reaches the app via host.docker.internal, which
# requires `extra_hosts: ["host.docker.internal:host-gateway"]` on the nginx service
# and the app published on a bridge-reachable port (NOT loopback-only). See
# docs/DEPLOYMENT.md.

# (1) Required for WebSocket upgrades. Belongs in the http{} context — conf.d/*.conf
#     is included there, so put it at the top of default.conf (or its own conf.d file).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# (2) Inside the games.online-trash.com server { ... } block, before `location /`:
#
# location = /thousand {
#     return 301 /thousand/;
# }
#
# location /thousand/ {
#     proxy_pass http://host.docker.internal:3000/;   # trailing slash strips /thousand
#
#     proxy_http_version 1.1;
#     proxy_set_header Upgrade            $http_upgrade;
#     proxy_set_header Connection         $connection_upgrade;
#     proxy_set_header Host               $host;
#     proxy_set_header X-Real-IP          $remote_addr;
#     proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
#     proxy_set_header X-Forwarded-Proto  $scheme;
#
#     proxy_read_timeout 3600s;            # keep idle WebSockets alive
# }
