name: Deploy

# Build + push the image to GHCR and redeploy on the VPS, but only after CI
# (lint/test/build) has succeeded on master.
on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [master]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    # Only run if the triggering CI run passed.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      IMAGE: ghcr.io/${{ github.repository }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.event.workflow_run.head_sha }}

      - name: Deploy on VPS over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ${{ env.IMAGE }}:latest
            docker rm -f thousand || true
            docker run -d --name thousand --restart unless-stopped -p 3000:3000 \
              -e NODE_ENV=production -e BASE_PATH=/thousand \
              -e ALLOWED_ORIGINS=https://games.online-trash.com \
              ${{ env.IMAGE }}:latest
            docker image prune -f
