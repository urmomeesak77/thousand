name: Deploy

# Manually triggered: build + push the image to GHCR and redeploy on the VPS.
# Run from the Actions tab ("Run workflow") or: gh workflow run Deploy
# CI still runs automatically on push; this deploy no longer triggers off it.
on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      IMAGE: ghcr.io/${{ github.repository }}

    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy on VPS over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ${{ env.IMAGE }}:latest
            docker rm -f thousand || true
            docker run -d --name thousand --restart unless-stopped -p 3000:3000 \
              -e NODE_ENV=production -e BASE_PATH=/thousand \
              -e ALLOWED_ORIGINS=https://games.online-trash.com \
              ${{ env.IMAGE }}:latest
            docker image prune -f
