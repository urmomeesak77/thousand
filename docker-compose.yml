services:
  thousand:
    build: .
    image: ghcr.io/urmomeesak77/thousand:latest
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - BASE_PATH=/thousand
      - ALLOWED_ORIGINS=https://games.online-trash.com
    # The nginx *container* reaches this app via the Docker host-gateway, which
    # can't see a loopback-only bind — so publish on all interfaces and keep
    # port 3000 off the public internet with the host firewall (nginx :443 is
    # the sole public entry point). See docs/DEPLOYMENT.md.
    ports:
      - "3000:3000"
